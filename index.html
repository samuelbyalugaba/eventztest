
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
      <meta name="theme-color" content="#8A2BE2" />
      <meta name="description" content="The Hub of Live Events" />
      <link rel="manifest" href="/manifest.json" />
      <link rel="icon" type="image/x-icon" href="/favicon.ico" />
      <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
      <title>Eventz - HD Live Events</title>
      <script>
        window.onerror = function(message, source, lineno, colno, error) {
          console.error("Global Error:", message, error);
          // Only show in production if it's a critical failure preventing load
          if (!document.getElementById('root').hasChildNodes()) {
             const errorDiv = document.createElement('div');
             errorDiv.style.padding = '20px';
             errorDiv.style.color = 'red';
             errorDiv.style.fontFamily = 'monospace';
             errorDiv.style.backgroundColor = '#fff0f0';
             errorDiv.innerText = 'Application Error: ' + message;
             document.body.appendChild(errorDiv);
          }
        };
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
